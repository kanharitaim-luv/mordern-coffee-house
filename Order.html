<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Coffee</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
<a href="Home.html">Home</a>
<a href="Menu.html">Menu</a>
<a href="Order.html">Order</a>
<a href="Photo Spot.html">Photo Spot</a>
<a href="Contact.html">Contact</a>
</nav>

<section class="container">

<h1 style="text-align:center;margin-bottom:30px;">
Order Coffee
</h1>

<form>

<label>Customer Name</label>
<input type="text" placeholder="Enter your name">

<label>Table Number</label>
<select>
<option>Table 1</option>
<option>Table 2</option>
<option>Table 3</option>
<option>Table 4</option>
<option>Table 5</option>
<option>Table 6</option>
<option>Table 7</option>
<option>Table 8</option>
<option>Table 9</option>
<option>Table 10</option>
</select>

<label>Select Menu</label>
<select>
<option>Ice Latte</option>
<option>Cappuccino</option>
<option>Mocha Latte</option>
<option>Americano</option>
<option>Espresso</option>
<option>Green Tea</option>
<option>Matcha Latte</option>
<option>Brown Sugar Milk Tea</option>
</select>

<label>Quantity</label>
<input type="number" placeholder="Quantity">

<label>Special Note</label>
<textarea rows="4"></textarea>

<button type="submit">
Place Order
</button>

</form>

</section>

<footer>
Modern Coffee House © 2025
</footer>
<style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#fff7ed;
color:#333;
}

nav{
background:#ea580c;
padding:15px;
display:flex;
justify-content:center;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#fef3c7;
}

.hero{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1495474472287-4d71bcdd2085") center/cover;
}

.hero-content{
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:10px;
color:white;
}

.hero h1{
font-size:60px;
margin-bottom:10px;
}

.btn{
display:inline-block;
background:#f97316;
color:white;
padding:12px 25px;
margin-top:15px;
text-decoration:none;
border-radius:5px;
}

.container{
width:90%;
margin:auto;
padding:40px 0;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.price{
color:#ea580c;
font-weight:bold;
}

form{
max-width:500px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#ea580c;
color:white;
border:none;
padding:12px;
width:100%;
cursor:pointer;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:10px;
}

.contact-box{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

footer{
background:#ea580c;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</body>
</html>
